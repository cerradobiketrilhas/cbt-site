# CBT - Nginx Configuration for Performance & Security
# =====================================================
# Add this to your nginx server block { }

# Gzip compression
gzip on;
gzip_vary on;
gzip_min_length 1000;
gzip_proxied any;
gzip_types text/plain text/css text/xml text/javascript 
           application/x-javascript application/xml+rss 
           application/json application/javascript
           image/svg+xml;
gzip_disable "MSIE [1-6]\.";

# Browser cache control
location ~* \.(webp|jpeg|jpg|png|gif|ico|svg)$ {
  expires 1y;
  add_header Cache-Control "public, immutable, max-age=31536000";
  access_log off;
}

location ~* \.(css|js)$ {
  expires 30d;
  add_header Cache-Control "public, max-age=2592000";
}

location ~* \.(html|htm)$ {
  expires 1d;
  add_header Cache-Control "public, max-age=86400";
}

# Security headers
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' https://www.googletagmanager.com https://cdnjs.cloudflare.com; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com https://api.mercadopago.com; form-action 'self'; upgrade-insecure-requests; block-all-mixed-content" always;

# Hide technology fingerprints
server_tokens off;

# Rewrite for clean URLs (optional)
# location / {
#   try_files $uri $uri/ $uri.html =404;
# }

# Disable directory listing
autoindex off;

# Block sensitive files
location ~ /\.(env|git) {
  deny all;
}
location ~* \.(bak|sql|log)$ {
  deny all;
}

# GZIP for SVG
location ~* \.svg$ {
  gzip on;
  gzip_vary on;
  expires 1y;
  add_header Cache-Control "public, immutable, max-age=31536000";
}
