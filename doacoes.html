<script>
const pixCode = `00020126710014BR.GOV.BCB.PIX0114+55619997134370231As trilhas agradecem pela ajuda5204000053039865802BR5921Raniel Mourao de Melo6009SAO PAULO61080540900062160512NUiNnO7MmSjq630419AD`;

new QRCode(document.getElementById("qrcode"), {
  text: pixCode,
  width: 200,
  height: 200
});

function copiarPix() {
  const campo = document.getElementById("pixTexto");
  campo.select();
  document.execCommand("copy");
  alert("Código Pix copiado!");
}
</script>
