  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" as="style">
  
  <link rel="stylesheet" href="style.css">

  <!-- Config loader (cache bust) -->
  <script>
    (function () {
      var s = document.createElement('script');
      s.async = true;
      s.src = 'config.js?v=' + Date.now();
      document.head.appendChild(s);
    })();
  </script>
</head>

<body>
  <div id="loader"><div class="wheel"></div></div>
  
  <!-- Header navigation will go here -->
  <!-- Main content sections will go here -->
  <!-- Footer will go here -->
  
  <!-- QRCode library (para pagina de doacoes) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
  
  <!-- Main optimized app script with cache busting -->
  <script>
    (function () {
      const version = Date.now();
      const appScript = document.createElement("script");
      appScript.src = `script-optimized.js?v=${version}`;
      appScript.async = false;
      document.body.appendChild(appScript);
    })();
  </script>
  
  <!-- Service Worker Registration for offline support -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('[SW] Registered:', reg))
          .catch(err => console.error('[SW] Registration failed:', err));
      });
    }
  </script>
</body>
